    <meta name="theme-color" content="#1A1A1A" />

    <title>RE-CALL Business & Services | Eventos Corporativos</title>

    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RE-CALL Business & Services | Eventos Corporativos" />
    <meta
      name="twitter:description"
      content="Organização e produção de eventos corporativos, conferências, galas, lançamentos, workshops e experiências empresariais personalizadas."

    <!-- Schema.org LocalBusiness / EventPlanner -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EventPlanner",
        "name": "RE-CALL Business & Services, Lda",
        "image": "/assets/logo-recall.png",
        "description": "Organização e realização de eventos corporativos, conferências, galas, lançamentos, workshops e experiências empresariais personalizadas.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Avenida de Portugal",
          "addressLocality": "Ingombota, Luanda",
          "addressCountry": "AO"
        },
        "telephone": "+244-921-483-399",
        "email": "geral@recallcom.com",
        "priceRange": "$$$",
        "url": "https://www.recall-eventos.com/",
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "08:00",
          "closes": "17:00"
        }
      }
    </script>

  </head>

    <div id="root"></div>
